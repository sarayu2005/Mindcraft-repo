<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINDCRAFT: Advanced Sector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CYBER FOREST THEME */
            --space-bg: #020b05; /* Deep Forest Black */
            --neon-primary: #10b981; /* Emerald */
            --neon-secondary: #06b6d4; /* Cyan */
            --neon-accent: #f59e0b; /* Amber */
            --neon-danger: #ef4444; /* Red for Exit */
            --glass-bg: rgba(6, 30, 20, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--space-bg);
            color: white;
            user-select: none;
        }

        /* --- VIEWPORT --- */
        #viewport {
            width: 100vw;
            height: 100vh;
            overflow: scroll;
            position: relative;
            scrollbar-width: none;
            cursor: grab;
        }
        #viewport::-webkit-scrollbar { display: none; }
        #viewport.grabbing { cursor: grabbing; }

        /* --- WORLD --- */
        #world {
            width: 3000px;
            height: 3000px;
            position: relative;
            /* Green/Dark Gradient */
            background: radial-gradient(circle at 50% 50%, #064e3b 0%, #020b05 70%);
            background-size: cover;
        }
        
        /* "Data Spores" instead of Stars */
        .star {
            position: absolute;
            background: #34d399; /* Light Green */
            border-radius: 50%;
            animation: floatUp var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
            box-shadow: 0 0 5px #34d399;
        }
        @keyframes floatUp {
            0%, 100% { opacity: 0.2; transform: translateY(0px) scale(0.8); }
            50% { opacity: 0.8; transform: translateY(-20px) scale(1.2); }
        }

        /* --- HUD --- */
        .hud-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .hud-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--neon-primary);
            border-left: 6px solid var(--neon-primary);
            padding: 15px 25px;
            border-radius: 6px;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            display: flex;
            flex-direction: column;
            min-width: 260px;
            pointer-events: auto;
            transform: skewX(-8deg);
            transition: all 0.3s;
        }
        .hud-card:hover { box-shadow: 0 0 40px rgba(16, 185, 129, 0.4); }

        .hud-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: var(--neon-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            transform: skewX(8deg);
        }

        .hud-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px var(--neon-primary);
            transform: skewX(8deg);
        }

        /* XP Bar */
        .xp-track {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            transform: skewX(8deg);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-primary), var(--neon-secondary));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--neon-primary);
        }

        .reset-btn {
            margin-top: 10px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
            color: #ffaaaa;
            font-size: 0.7rem;
            padding: 5px;
            cursor: pointer;
            pointer-events: auto;
            font-family: 'Orbitron';
            text-transform: uppercase;
            transition: 0.2s;
        }
        .reset-btn:hover { background: red; color: white; }

        /* --- NODES --- */
        .node-container {
            position: absolute;
            width: 220px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .node-container:hover {
            transform: scale(1.15) translateY(-10px);
            z-index: 50;
        }

        .planet-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent), var(--planet-color);
            box-shadow: 0 0 50px var(--glow-color), inset 0 0 30px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .planet-orb::before { /* Orbit Ring */
            content: '';
            position: absolute; width: 160%; height: 160%;
            border: 1px dashed var(--glow-color);
            border-radius: 50%;
            animation: spin 60s linear infinite;
            pointer-events: none; opacity: 0.3;
        }

        .node-icon { font-size: 4rem; color: white; z-index: 2; filter: drop-shadow(0 0 10px black); }

        .node-label {
            margin-top: 30px;
            background: #020b05;
            border: 1px solid var(--glow-color);
            color: var(--glow-color);
            padding: 12px 24px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 20px var(--glow-color);
            text-align: center;
        }

        /* CONNECTIONS */
        #connections { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .conn-line { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 8; }
        .conn-pulse {
            fill: none; stroke: var(--neon-primary); stroke-width: 8; stroke-dasharray: 40, 400;
            animation: pulsePath 3s linear infinite;
            filter: drop-shadow(0 0 15px var(--neon-primary));
        }
        @keyframes pulsePath { to { stroke-dashoffset: -440; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MISSION MODAL --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #modal-overlay.active { opacity: 1; pointer-events: all; }

        .mission-card {
            background: #022c22; /* Dark Green Card */
            border: 2px solid var(--neon-primary);
            width: 550px;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 80px rgba(16, 185, 129, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
        }
        #modal-overlay.active .mission-card { transform: scale(1); }

        .mission-title { font-family: 'Orbitron'; font-size: 2rem; color: var(--neon-primary); margin-bottom: 15px; border-bottom: 1px solid #064e3b; padding-bottom: 10px;}
        .mission-desc { color: #d1fae5; line-height: 1.6; margin-bottom: 30px; font-size: 1.1rem; }
        
        .btn-launch {
            background: var(--neon-primary); color: #020b05; font-family: 'Orbitron'; font-weight: bold; border: none;
            padding: 15px 30px; width: 100%; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
            letter-spacing: 2px; font-size: 1.1rem; clip-path: polygon(5% 0, 100% 0, 100% 80%, 95% 100%, 0 100%, 0 20%);
        }
        .btn-launch:hover { background: white; color: var(--neon-primary); box-shadow: 0 0 30px white; }
        .btn-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #6ee7b7; cursor: pointer; }
        .btn-close:hover { color: white; }

        /* --- EXIT MODAL (NEW) --- */
        #exit-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 20, 10, 0.95); /* Dark Forest overlay */
            backdrop-filter: blur(8px);
            z-index: 3000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #exit-modal-overlay.active { opacity: 1; pointer-events: all; }

        .exit-card {
            background: #020b05;
            border: 2px solid var(--neon-danger);
            width: 500px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        #exit-modal-overlay.active .exit-card { transform: scale(1); }

        .exit-title { font-family: 'Orbitron'; font-size: 2rem; color: var(--neon-danger); margin-bottom: 20px; text-transform: uppercase; }
        
        .exit-btn-group { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        
        .btn-stay {
            background: transparent; border: 1px solid white; color: white;
            padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; transition: 0.2s; width: 180px;
        }
        .btn-stay:hover { background: white; color: black; }

        .btn-exit {
            background: var(--neon-danger); border: none; color: white;
            padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; transition: 0.2s; width: 180px;
            font-weight: bold;
        }
        .btn-exit:hover { background: white; color: var(--neon-danger); box-shadow: 0 0 20px var(--neon-danger); }

    </style>
</head>
<body>

    <div class="hud-panel">
        <div class="hud-card">
            <div class="hud-label">System Level</div>
            <div class="hud-value" id="hud-level">01</div>
        </div>

        <div class="hud-card">
            <div class="hud-label">Core Data (XP)</div>
            <div class="hud-value"><span id="hud-xp">0</span> <span style="font-size:1rem; opacity:0.6;">/ 500</span></div>
            <div class="xp-track">
                <div class="xp-fill" id="hud-xp-bar"></div>
            </div>
        </div>
        
        <button class="reset-btn" onclick="resetProgress()">[Reset System]</button>
    </div>

    <div id="viewport">
        <div id="world">
            <div id="stars"></div>
            <svg id="connections"></svg>

            <div class="node-container" id="node-trees" data-id="trees" style="top: 2000px; left: 800px; --planet-color: #10b981; --glow-color: #34d399;">
                <div class="planet-orb"><i data-lucide="git-fork" class="node-icon"></i></div>
                <div class="node-label">1. Trees</div>
            </div>

            <div class="node-container" id="node-heaps" data-id="heaps" style="top: 1400px; left: 1500px; --planet-color: #d97706; --glow-color: #fbbf24;">
                <div class="planet-orb"><i data-lucide="triangle" class="node-icon"></i></div>
                <div class="node-label">2. Heaps</div>
            </div>

            <div class="node-container" id="node-graphs" data-id="graphs" style="top: 800px; left: 2200px; --planet-color: #0891b2; --glow-color: #22d3ee;">
                <div class="planet-orb"><i data-lucide="share-2" class="node-icon"></i></div>
                <div class="node-label">3. Graphs</div>
            </div>

            <div class="node-container" id="node-exit" data-id="exit" style="top: 400px; left: 2800px; --planet-color: #ef4444; --glow-color: #fca5a5;">
                <div class="planet-orb"><i data-lucide="log-out" class="node-icon"></i></div>
                <div class="node-label">System Exit</div>
            </div>

        </div>
    </div>

    <div id="modal-overlay">
        <div class="mission-card">
            <button class="btn-close" onclick="closeModal()"><i data-lucide="x"></i></button>
            <div class="mission-title" id="m-title">MISSION BRIEF</div>
            <div class="mission-desc" id="m-desc">Briefing...</div>
            <button class="btn-launch" onclick="launchTask()">ACCESS MODULE</button>
        </div>
    </div>

    <div id="exit-modal-overlay">
        <div class="exit-card">
            <div class="exit-title">DISCONNECT LINK?</div>
            <div style="color: #ccc; margin-bottom: 25px; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;">
                You are about to leave the Advanced Sector.
            </div>
            <div class="exit-btn-group">
                <button class="btn-stay" onclick="closeExitModal()">STAY IN PAGE</button>
                <button class="btn-exit" onclick="exitToHub()">LINK TO LEVEL.HTML</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- CONSTANTS ---
        const DB_KEY = 'mindcraft_adv_v1'; 
        
        // ADDED 'exit' to levels
        const LEVELS = ['trees', 'heaps', 'graphs', 'exit'];
        
        const MISSION_INFO = {
            trees: { title: "BINARY FOREST", desc: "Hierarchical data detected. Navigate the root, branches, and leaves of the Tree structure.", xp: 200 },
            heaps: { title: "THE PYRAMID", desc: "Priority Systems online. Manage Min-Heaps and Max-Heaps for efficient sorting.", xp: 400 },
            graphs: { title: "NETWORK CORE", desc: "Complex interconnections found. Traverse the Graph nodes and edges using BFS and DFS.", xp: 600 },
            exit: { title: "EXIT", desc: "", xp: 0 }
        };

        // --- STATE ---
        let state = {
            xp: 0,
            level: 1,
            unlocked: [...LEVELS], // DEFAULT ALL UNLOCKED
            completed: []
        };

        // --- INIT ---
        window.onload = () => {
            loadState();
            renderMap();
            generateStars();
            centerViewport();
        };

        // --- STORAGE SYNC ---
        window.addEventListener('storage', (e) => {
            if (e.key === DB_KEY) {
                loadState();
                renderMap();
            }
        });

        function loadState() {
            const saved = localStorage.getItem(DB_KEY);
            if (saved) {
                state = JSON.parse(saved);
                state.unlocked = [...LEVELS]; 
            } else {
                saveState(); 
            }
            updateHUD();
        }

        function saveState() {
            localStorage.setItem(DB_KEY, JSON.stringify(state));
            updateHUD();
        }

        function resetProgress() {
            if(confirm("Reset Advanced Module progress?")) {
                state = { xp: 0, level: 1, unlocked: [...LEVELS], completed: [] };
                saveState();
                renderMap();
                centerViewport();
            }
        }

        // --- RENDER ---
        function updateHUD() {
            const xpCap = state.level * 500;
            const pct = Math.min((state.xp / xpCap) * 100, 100);
            
            document.getElementById('hud-level').innerText = String(state.level).padStart(2, '0');
            document.getElementById('hud-xp').innerText = state.xp;
            document.getElementById('hud-xp-bar').style.width = `${pct}%`;
        }

        function renderMap() {
            LEVELS.forEach(id => {
                const node = document.getElementById(`node-${id}`);
                // Ensure no visual locking
                node.classList.remove('locked');
            });
            drawConnections();
        }

        // --- INTERACTION ---
        let currentMissionId = null;

        document.querySelectorAll('.node-container').forEach(node => {
            node.addEventListener('click', () => {
                const id = node.getAttribute('data-id');
                
                // Check if Exit Node
                if(id === 'exit') {
                    openExitModal();
                } else {
                    openModal(id);
                }
            });
        });

        function openModal(id) {
            currentMissionId = id;
            const info = MISSION_INFO[id];
            document.getElementById('m-title').innerText = info.title;
            document.getElementById('m-desc').innerText = info.desc;
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        // --- EXIT LOGIC ---
        function openExitModal() {
            document.getElementById('exit-modal-overlay').classList.add('active');
        }

        function closeExitModal() {
            document.getElementById('exit-modal-overlay').classList.remove('active');
        }

        function exitToHub() {
            window.location.href = "level.html";
        }

        // --- LAUNCHER ---
        function launchTask() {
            closeModal(); 

            // MAPPING IDs TO YOUR SPECIFIC FILENAMES
            const missionFiles = {
                'trees': 'ADV_Trees.html',
                'heaps': 'ADV_Heap.html',
                'graphs': 'ADV_Graphs.html'
            };

            const targetFile = missionFiles[currentMissionId];

            if (targetFile) {
                window.location.href = targetFile;
            } else {
                alert("Navigation Error: File link not found for " + currentMissionId);
            }
        }

        // --- VISUALS ---
        function generateStars() {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for(let i=0; i<250; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 4;
                s.style.width = size+'px'; s.style.height = size+'px';
                s.style.left = Math.random()*3000+'px'; s.style.top = Math.random()*3000+'px';
                s.style.setProperty('--duration', (3+Math.random()*5)+'s');
                container.appendChild(s);
            }
        }

        function drawConnections() {
            const svg = document.getElementById('connections');
            svg.innerHTML = ''; 
            
            // Connect: Trees -> Heaps -> Graphs -> Exit
            const pairs = [
                ['trees', 'heaps'], 
                ['heaps', 'graphs'],
                ['graphs', 'exit'] // New Connection
            ];
            
            pairs.forEach(pair => {
                const node1 = document.getElementById(`node-${pair[0]}`);
                const node2 = document.getElementById(`node-${pair[1]}`);
                
                if(!node1 || !node2) return;

                const el1 = node1.getBoundingClientRect();
                const el2 = node2.getBoundingClientRect();
                const world = document.getElementById('world').getBoundingClientRect();
                
                const x1 = (el1.left - world.left) + el1.width/2;
                const y1 = (el1.top - world.top) + el1.height/2;
                const x2 = (el2.left - world.left) + el2.width/2;
                const y2 = (el2.top - world.top) + el2.height/2;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("class", "conn-line");
                path.setAttribute("d", `M ${x1} ${y1} L ${x2} ${y2}`);
                svg.appendChild(path);

                // Always pulse since unlocked
                const pulse = path.cloneNode();
                pulse.setAttribute("class", "conn-pulse");
                svg.appendChild(pulse);
            });
        }

        // Drag Scroll
        const vp = document.getElementById('viewport');
        let isDown=false, startX, startY, scrollLeft, scrollTop;
        vp.addEventListener('mousedown', e => { isDown=true; vp.classList.add('grabbing'); startX=e.pageX - vp.offsetLeft; startY=e.pageY - vp.offsetTop; scrollLeft=vp.scrollLeft; scrollTop=vp.scrollTop; });
        vp.addEventListener('mouseleave', () => { isDown=false; vp.classList.remove('grabbing'); });
        vp.addEventListener('mouseup', () => { isDown=false; vp.classList.remove('grabbing'); });
        vp.addEventListener('mousemove', e => { if(!isDown)return; e.preventDefault(); const x=e.pageX-vp.offsetLeft; const y=e.pageY-vp.offsetTop; vp.scrollLeft = scrollLeft - (x-startX); vp.scrollTop = scrollTop - (y-startY); });

        // Center on Heaps (Middle Node)
        function centerViewport() { 
            vp.scrollLeft = 1000; 
            vp.scrollTop = 900; 
        }

    </script>
</body>
</html>
